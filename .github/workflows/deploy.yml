name: Deploy Website

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build on GitHub Cloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          DATABASE_URL: 'file:/tmp/dummy.db'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            .next/
            public/
            package.json
            package-lock.json
            prisma/
            next.config.ts
          retention-days: 1

  deploy:
    name: Deploy to Pi
    runs-on: self-hosted
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: /tmp/nextjs-build

      - name: Sync build to target directory
        run: |
          mkdir -p /home/johannes/apps/my-website
          rsync -av --delete \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='dev.db' \
            /tmp/nextjs-build/ /home/johannes/apps/my-website/

      - name: Install production dependencies (native binaries for ARM64)
        working-directory: /home/johannes/apps/my-website
        run: |
          npm ci --omit=dev --no-audit --no-fund

      - name: Generate Prisma Client for ARM64
        working-directory: /home/johannes/apps/my-website
        run: npx prisma generate

      - name: Restart with PM2
        run: |
          cd /home/johannes/apps/my-website
          pm2 restart active-site || pm2 start npm --name "active-site" -- start
          pm2 save

      - name: Cleanup artifact
        run: rm -rf /tmp/nextjs-build
