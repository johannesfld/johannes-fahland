name: Auto Deploy
on:
  push:
    branches: [ master ] # Falls dein Haupt-Branch "master" heißt, ändere das hier

jobs:
  deploy:
    runs-on: self-hosted # Das sagt GitHub: "Mach das auf meinem Pi!"
    defaults:
      run:
        working-directory: /home/johannes/apps/my-website
    steps:
      - name: Code vom Repo holen
        uses: actions/checkout@v4
        with: 
          path: /home/johannes/apps/my-website
          clean: false # Verhindert, dass deine .env oder die DB gelöscht wird!

      - name: Build and Restart
        run: |
          cd ~/apps/my-website
          # Nur neue Pakete installieren, ohne alles jedes Mal zu prüfen
          npm install --no-audit --no-fund
          # Dem Pi helfen: Node mehr Speicher erlauben (virtuell)
          export NODE_OPTIONS="--max-old-space-size=1536"
          npm run build
          pm2 restart next-website