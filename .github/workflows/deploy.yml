name: Deploy to Pi

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          DATABASE_URL: file:/tmp/dummy.db

      - name: Assemble standalone bundle
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          cp -r prisma .next/standalone/prisma
          cp -r scripts .next/standalone/scripts

      - name: Install ARM64 native binaries
        run: |
          mkdir -p /tmp/arm64-deps
          cd /tmp/arm64-deps
          cp $GITHUB_WORKSPACE/package.json .
          npm install --cpu=arm64 --os=linux --libc=glibc --ignore-scripts 2>/dev/null || true

          STANDALONE_NM=$GITHUB_WORKSPACE/.next/standalone/node_modules

          # better-sqlite3 arm64 prebuild — REQUIRED. Build runs on x64,
          # Pi is arm64. Without this, every Prisma call crashes at runtime.
          BS3_DIR="$STANDALONE_NM/better-sqlite3"
          if [ ! -d "$BS3_DIR" ]; then
            echo "ERROR: better-sqlite3 missing from standalone bundle"
            exit 1
          fi
          (
            cd "$BS3_DIR"
            npx --yes prebuild-install --platform=linux --arch=arm64 --runtime=node \
              || npx --yes prebuild-install --platform=linux --arch=arm64
          )
          BIN="$BS3_DIR/build/Release/better_sqlite3.node"
          file "$BIN"
          if ! file "$BIN" | grep -qE 'ARM aarch64|aarch64'; then
            echo "ERROR: better-sqlite3 binary is not ARM64 after prebuild-install"
            exit 1
          fi

          # sharp arm64
          for pkg in @img/sharp-linux-arm64 @img/sharp-libvips-linux-arm64; do
            if [ -d "/tmp/arm64-deps/node_modules/$pkg" ]; then
              mkdir -p "$STANDALONE_NM/$pkg"
              cp -r /tmp/arm64-deps/node_modules/$pkg/. "$STANDALONE_NM/$pkg/"
            fi
          done

          # next/swc arm64
          for pkg in @next/swc-linux-arm64-gnu @next/swc-linux-arm64-musl; do
            if [ -d "/tmp/arm64-deps/node_modules/$pkg" ]; then
              mkdir -p "$STANDALONE_NM/$pkg"
              cp -r /tmp/arm64-deps/node_modules/$pkg/. "$STANDALONE_NM/$pkg/"
            fi
          done

          # Strip x64 binaries to reduce artifact size
          find "$STANDALONE_NM" -name '*linux-x64*' -type d | xargs rm -rf || true

      - name: Write deploy meta
        run: |
          echo "{\"sha\":\"$GITHUB_SHA\",\"ref\":\"$GITHUB_REF\",\"built\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
            > .next/standalone/.deploy-meta.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi-release
          path: .next/standalone/
          retention-days: 1
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PI_SSH_KEY }}" > ~/.ssh/pi_key
          chmod 600 ~/.ssh/pi_key
          echo "${{ secrets.PI_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: pi-release
          path: /tmp/pi-release

      - name: Deploy via rsync over SSH
        run: |
          rsync -az --delete \
            --exclude='.env' \
            --exclude='data/' \
            -e "ssh -i ~/.ssh/pi_key -o StrictHostKeyChecking=yes" \
            /tmp/pi-release/ \
            ${{ secrets.PI_SSH_USER }}@${{ secrets.PI_SSH_HOST }}:/home/johannes/apps/active-site/

      - name: Verify ARM64 binary, migrate, restart PM2
        run: |
          ssh -i ~/.ssh/pi_key -o StrictHostKeyChecking=yes \
            ${{ secrets.PI_SSH_USER }}@${{ secrets.PI_SSH_HOST }} << 'ENDSSH'
          set -e

          # Verify ARM64 binary
          file /home/johannes/apps/active-site/node_modules/better-sqlite3/build/Release/better_sqlite3.node

          # Prisma migrations
          mkdir -p /home/johannes/apps/data
          cd /home/johannes/apps/active-site
          set -a && source .env && set +a
          node scripts/migrate.mjs

          # Restart PM2
          pm2 delete active-site 2>/dev/null || true
          PORT=3000 HOSTNAME=0.0.0.0 pm2 start server.js --name active-site
          pm2 save

          # Smoke test
          for i in 1 2 3 4 5; do
            sleep 2
            curl -sf http://localhost:3000/ >/dev/null || continue
            body=$(curl -sf http://localhost:3000/tischtennis-turnier) || continue
            if echo "$body" | grep -q "page couldn"; then
              echo "Smoke test failed: /tischtennis-turnier rendered server error"
              exit 1
            fi
            echo "OK" && exit 0
          done
          echo "Smoke test failed" && exit 1
          ENDSSH

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/pi-release
