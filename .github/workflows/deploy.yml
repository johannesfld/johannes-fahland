name: Deploy Website

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build on GitHub Cloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          DATABASE_URL: 'file:/tmp/dummy.db'

      - name: Copy public into standalone
        run: cp -r public .next/standalone/public

      - name: Copy static into standalone
        run: cp -r .next/static .next/standalone/.next/static

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/standalone/
          retention-days: 1

  deploy:
    name: Deploy to Pi
    runs-on: self-hosted
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: /tmp/nextjs-build

      - name: Sync standalone build to target directory
        run: |
          mkdir -p /home/johannes/apps/my-website
          rsync -av --delete \
            --exclude='.env' \
            --exclude='dev.db' \
            /tmp/nextjs-build/ /home/johannes/apps/my-website/

      - name: Generate Prisma Client for ARM64
        working-directory: /home/johannes/apps/my-website
        run: npx prisma generate

      - name: Restart with PM2
        run: |
          pm2 restart active-site \
            || pm2 start node --name "active-site" -- /home/johannes/apps/my-website/server.js
          pm2 save

      - name: Cleanup artifact
        run: rm -rf /tmp/nextjs-build
