name: Deploy Website

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build on GitHub Cloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install build dependencies (host arch)
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          DATABASE_URL: 'file:/tmp/dummy.db'

      - name: Copy public into standalone
        run: cp -r public .next/standalone/public

      - name: Copy static into standalone
        run: cp -r .next/static .next/standalone/.next/static

      - name: Replace native modules with ARM64 binaries
        run: |
          set -e
          # Standalone hat ein minimales node_modules mit nur den vom Server-Code
          # importierten Modulen. Native Binaries darin sind x64. Wir installieren
          # die Plattform-spezifischen optionalDependencies fuer ARM64 in einem
          # temporaeren Verzeichnis und mergen sie ins standalone.
          mkdir -p /tmp/arm64-deps
          cp package.json package-lock.json /tmp/arm64-deps/
          cd /tmp/arm64-deps
          npm install --cpu=arm64 --os=linux --libc=glibc --include=optional \
            --omit=dev --no-audit --no-fund --ignore-scripts

          # Liste aller plattform-spezifischen Pakete fuer ARM64-glibc
          # (libsql + sharp). Andere Packages bleiben unveraendert vom Build.
          ARM64_PKGS=(
            "@libsql/linux-arm64-gnu"
            "@img/sharp-linux-arm64"
            "@img/sharp-libvips-linux-arm64"
          )

          STANDALONE_NM="$GITHUB_WORKSPACE/.next/standalone/node_modules"
          for pkg in "${ARM64_PKGS[@]}"; do
            SRC="/tmp/arm64-deps/node_modules/$pkg"
            DEST="$STANDALONE_NM/$pkg"
            if [ -d "$SRC" ]; then
              echo "Copying $pkg -> standalone"
              mkdir -p "$(dirname "$DEST")"
              rm -rf "$DEST"
              cp -r "$SRC" "$DEST"
            else
              echo "WARN: $pkg not found in arm64 install"
            fi
          done

          # x64-spezifische Binaries aus standalone entfernen damit Pi sie nicht laedt
          rm -rf "$STANDALONE_NM/@libsql/linux-x64-gnu" || true
          rm -rf "$STANDALONE_NM/@libsql/linux-x64-musl" || true
          rm -rf "$STANDALONE_NM/@img/sharp-linux-x64" || true
          rm -rf "$STANDALONE_NM/@img/sharp-libvips-linux-x64" || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/standalone/
          include-hidden-files: true
          retention-days: 1

  deploy:
    name: Deploy to Pi
    runs-on: self-hosted
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: /tmp/nextjs-build

      - name: Sync standalone build to target directory
        run: |
          mkdir -p /home/johannes/apps/my-website
          rsync -av --delete \
            --exclude='.env' \
            --exclude='dev.db' \
            /tmp/nextjs-build/ /home/johannes/apps/my-website/

      - name: Restart with PM2
        run: |
          set -a
          . /home/johannes/apps/my-website/.env
          set +a
          pm2 delete active-site 2>/dev/null || true
          PORT=3000 HOSTNAME=0.0.0.0 pm2 start /home/johannes/apps/my-website/server.js \
            --name "active-site" \
            --cwd /home/johannes/apps/my-website \
            --update-env
          pm2 save

      - name: Cleanup artifact
        run: rm -rf /tmp/nextjs-build
