name: Deploy to Pi

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [hub, turnier]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @spielbrett/db generate

      - name: Build ${{ matrix.app }}
        run: pnpm --filter ${{ matrix.app }} build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          DATABASE_URL: file:/tmp/dummy.db

      - name: Assemble standalone bundle
        run: bash scripts/deploy-assemble.sh ${{ matrix.app }}

      - name: Install ARM64 native binaries
        run: bash scripts/install-arm64-natives.sh ${{ matrix.app }}

      - name: Write deploy meta
        run: |
          echo "{\"sha\":\"$GITHUB_SHA\",\"ref\":\"$GITHUB_REF\",\"app\":\"${{ matrix.app }}\",\"built\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
            > apps/${{ matrix.app }}/.next/standalone/.deploy-meta.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi-release-${{ matrix.app }}
          path: apps/${{ matrix.app }}/.next/standalone/
          retention-days: 1
          include-hidden-files: true

  deploy:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Download hub artifact
        uses: actions/download-artifact@v4
        with:
          name: pi-release-hub
          path: /tmp/pi-release-hub

      - name: Download turnier artifact
        uses: actions/download-artifact@v4
        with:
          name: pi-release-turnier
          path: /tmp/pi-release-turnier

      - name: Rsync hub
        run: |
          mkdir -p /home/johannes/apps/active-site/hub
          rsync -a --delete \
            --exclude='.env' \
            --exclude='data/' \
            /tmp/pi-release-hub/ \
            /home/johannes/apps/active-site/hub/

      - name: Rsync turnier
        run: |
          mkdir -p /home/johannes/apps/active-site/turnier
          rsync -a --delete \
            --exclude='.env' \
            --exclude='data/' \
            /tmp/pi-release-turnier/ \
            /home/johannes/apps/active-site/turnier/

      - name: Verify ARM64 binaries
        run: |
          HUB_BS3=$(find /home/johannes/apps/active-site/hub -name 'better_sqlite3.node' -path '*build/Release*' | head -1)
          TURN_BS3=$(find /home/johannes/apps/active-site/turnier -name 'better_sqlite3.node' -path '*build/Release*' | head -1)
          for B in "$HUB_BS3" "$TURN_BS3"; do
            [ -n "$B" ] || { echo "ERROR: better_sqlite3.node missing"; exit 1; }
            file "$B"
            file "$B" | grep -qE 'ARM aarch64|aarch64' || { echo "ERROR: $B is not arm64"; exit 1; }
          done

      - name: Run Prisma migrations (shared DB)
        run: |
          mkdir -p /home/johannes/apps/data
          set -a && source /home/johannes/apps/active-site/hub/.env && set +a
          node /home/johannes/apps/active-site/hub/packages/db/scripts/migrate.mjs

      - name: Reload PM2 (both apps)
        run: |
          pm2 startOrReload /home/johannes/apps/ecosystem.config.cjs --update-env
          pm2 save

      - name: Smoke test
        run: |
          for i in 1 2 3 4 5 6 7 8; do
            sleep 2
            HUB_OK=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:3000/) || HUB_OK=0
            TURN_OK=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:3001/) || TURN_OK=0
            if [ "$HUB_OK" = "200" ] && [ "$TURN_OK" = "200" ]; then
              echo "Smoke OK (hub=$HUB_OK, turnier=$TURN_OK)"
              exit 0
            fi
            echo "attempt $i: hub=$HUB_OK turnier=$TURN_OK"
          done
          echo "Smoke test failed"
          exit 1

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/pi-release-hub /tmp/pi-release-turnier
